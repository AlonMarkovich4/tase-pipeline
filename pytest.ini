[pytest]
# Collect only the tests/ package.
#
# The repo-root test_strategy_engine.py is a STANDALONE script (its docstring
# says "Run with: python3 test_strategy_engine.py"). At import time it installs
# an INCOMPLETE global `config` stub via `sys.modules["config"] = ...` that is
# missing names the infra modules need (BATCH_SIZE, PAGE_TIMEOUT_MS, ...).
# Under a bare `pytest` run that root file is collected before the tests/ suite,
# so its stub shadows the real config.py and every later test that does
# `from config import <NAME>` fails with "unknown location". Scoping collection
# to tests/ makes `python -m pytest` equivalent to the already-green
# `pytest tests/`. (Run the legacy benchmark separately if needed.)
testpaths = tests
